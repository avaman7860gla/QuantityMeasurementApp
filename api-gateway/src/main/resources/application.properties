spring.application.name=api-gateway

# Server Port
server.port=8080

# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# Measurement Service
spring.cloud.gateway.routes[1].id=measurement-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/measurement/**

# History Service
spring.cloud.gateway.routes[2].id=history-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/history/**

spring.main.web-application-type=reactive